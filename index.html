<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Калькулятор кухни</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f2f2f7;
margin:0;
padding:0;
text-align:center;
}

.logo{
width:220px;
margin-top:20px;
}

.screen{
display:none;
padding:20px;
}

.active{
display:block;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.card{
background:white;
border-radius:20px;
padding:16px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:140px;
border-radius:18px;
}

.button{
background:black;
color:white;
padding:14px;
border-radius:14px;
margin-top:20px;
cursor:pointer;
}

input, textarea{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
margin-top:10px;
}

.slider{
width:100%;
}

.price{
font-size:34px;
font-weight:bold;
margin-top:10px;
}

.resultKitchen{
width:220px;
margin-top:20px;
border-radius:20px;
}

</style>

</head>

<body>

<img src="logo.png" class="logo">

<!-- ШАГ 1 -->

<div class="screen active" id="step1">

<h2>Выберите форму кухни</h2>

<div class="grid">

<div class="card" onclick="setShape('Прямая','straight.png')">
<img src="straight.png">
<p>Прямая</p>
</div>

<div class="card" onclick="setShape('Угловая','corner.png')">
<img src="corner.png">
<p>Угловая</p>
</div>

<div class="card" onclick="setShape('П-образная','u-shape.png')">
<img src="u-shape.png">
<p>П-образная</p>
</div>

<div class="card" onclick="setShape('С островом','u-shape.png')">
<img src="u-shape.png">
<p>С островом</p>
</div>

</div>

</div>

<!-- ШАГ 2 -->

<div class="screen" id="step2">

<h2>Длина кухни</h2>

<p id="lengthValue">3 м</p>

<input type="range" min="2" max="8" step="0.1" value="3" class="slider" id="lengthSlider">

<div class="button" onclick="nextStep(3)">Далее</div>

</div>

<!-- ШАГ 3 -->

<div class="screen" id="step3">

<h2>Материал фасадов</h2>

<div class="grid">

<div class="card" onclick="setMaterial(0)">
<p>ЛДСП</p>
</div>

<div class="card" onclick="setMaterial(20000)">
<p>МДФ плёнка</p>
</div>

<div class="card" onclick="setMaterial(40000)">
<p>МДФ пластик</p>
</div>

<div class="card" onclick="setMaterial(60000)">
<p>МДФ эмаль</p>
</div>

<div class="card" onclick="setMaterial(80000)">
<p>Шпон</p>
</div>

</div>

</div>

<!-- ШАГ 4 -->

<div class="screen" id="step4">

<h2>Столешница</h2>

<div class="grid">

<div class="card" onclick="setCountertop(10000)">
<p>ЛДСП</p>
</div>

<div class="card" onclick="setCountertop(30000)">
<p>Компакт HPL</p>
</div>

<div class="card" onclick="setCountertop(40000)">
<p>Камень</p>
</div>

</div>

</div>

<!-- ШАГ 5 -->

<div class="screen" id="step5">

<h2>Фурнитура</h2>

<div class="grid">

<div class="card" onclick="setHardware(0)">
<img src="boyard.png">
</div>

<div class="card" onclick="setHardware(20000)">
<img src="gtv.png">
</div>

<div class="card" onclick="setHardware(40000)">
<img src="blum.png">
</div>

</div>

</div>

<!-- ШАГ 6 -->

<div class="screen" id="step6">

<h2>Предварительная стоимость кухни</h2>

<img id="resultKitchen" class="resultKitchen">

<div class="price" id="result"></div>

<div class="button" onclick="nextStep(7)">
Получить индивидуальный расчет
</div>

</div>

<!-- ШАГ 7 -->

<div class="screen" id="step7">

<h2>Ваши контакты</h2>

<input id="name" placeholder="Имя">

<input id="phone" placeholder="Телефон">

<textarea id="comment" placeholder="Комментарий"></textarea>

<div class="button" onclick="sendLead()">
Отправить
</div>

</div>

<script>

let basePrice = 35000

let shape
let shapeImage
let length = 3

let materialPrice = 0
let countertopPrice = 0
let hardwarePrice = 0

const slider = document.getElementById("lengthSlider")

slider.oninput = function(){

length = parseFloat(this.value)
document.getElementById("lengthValue").innerHTML = length + " м"

}

function nextStep(n){

document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))
document.getElementById('step'+n).classList.add('active')

}

function setShape(name,image){

shape=name
shapeImage=image

nextStep(2)

}

function setMaterial(price){

materialPrice=price
nextStep(4)

}

function setCountertop(price){

countertopPrice=price
nextStep(5)

}

function setHardware(price){

hardwarePrice=price
calculate()

}

function calculate(){

let total = (basePrice + materialPrice + countertopPrice + hardwarePrice) * length

document.getElementById("result").innerHTML =
Math.round(total).toLocaleString()+" ₽"

document.getElementById("resultKitchen").src = shapeImage

nextStep(6)

}

function sendLead(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let comment=document.getElementById("comment").value

let text=`
Новый расчет кухни

Форма: ${shape}
Длина: ${length} м

Имя: ${name}
Телефон: ${phone}

Комментарий: ${comment}
`

Telegram.WebApp.sendData(text)

}

</script>

</body>
</html>
