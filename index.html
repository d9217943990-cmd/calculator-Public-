<!DOCTYPE html>

<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Калькулятор кухни</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont;
background:#f2f2f5;
margin:0;
}

.container{
max-width:520px;
margin:auto;
padding:20px;
}

h2{
text-align:center;
margin-bottom:20px;
}

.cards{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.card{

background:white;
border-radius:22px;
padding:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
text-align:center;
position:relative;
transition:all .25s cubic-bezier(.34,1.56,.64,1);

}

.card img{

width:100%;
border-radius:14px;

}

.card:hover{

transform:scale(1.03);

}

.card.selected{

border:3px solid #007aff;
transform:scale(1.08);

}

.check{

position:absolute;
top:10px;
right:10px;
background:#007aff;
color:white;
width:28px;
height:28px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
opacity:0;
transform:scale(0.5);
transition:all .25s;

}

.card.selected .check{

opacity:1;
transform:scale(1);

}

.center{

grid-column:span 2;
width:60%;
margin:auto;

}

input{

width:100%;
padding:14px;
border-radius:12px;
border:none;
margin-bottom:12px;
font-size:16px;

}

button{

background:#007aff;
color:white;
border:none;
padding:16px;
width:100%;
border-radius:16px;
font-size:18px;

}

.result{

background:white;
border-radius:20px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,.1);

}

.progress{

position:fixed;
bottom:0;
left:0;
height:6px;
background:#007aff;
width:0%;
transition:.3s;

}

</style>

</head>

<body>

<div class="container">

<div id="screen1">

<h2>Форма кухни</h2>

<div class="cards">

<div class="card" onclick="selectKitchen(this,'Прямая')">
<div class="check">✓</div>
<img src="straight.png">
<p>Прямая</p>
</div>

<div class="card" onclick="selectKitchen(this,'Угловая')">
<div class="check">✓</div>
<img src="corner.png">
<p>Угловая</p>
</div>

<div class="card" onclick="selectKitchen(this,'П-образная')">
<div class="check">✓</div>
<img src="u-shape.png">
<p>П-образная</p>
</div>

<div class="card" onclick="selectKitchen(this,'Остров')">
<div class="check">✓</div>
<img src="island.png">
<p>С островом</p>
</div>

</div>

</div>

<div id="screen2" style="display:none">

<h2>Длина кухни (м)</h2>

<input id="length" type="number" placeholder="например 3">

<button onclick="next2()">Далее</button>

</div>

<div id="screen3" style="display:none">

<h2>Материал фасадов</h2>

<div class="cards">

<div class="card" onclick="selectMaterial(this,'ЛДСП',0)">
<div class="check">✓</div>
<img src="ldsp.png">
<p>ЛДСП</p>
</div>

<div class="card" onclick="selectMaterial(this,'МДФ пленка',20000)">
<div class="check">✓</div>
<img src="plenka.png">
<p>МДФ пленка</p>
</div>

<div class="card" onclick="selectMaterial(this,'МДФ пластик',40000)">
<div class="check">✓</div>
<img src="plastic.png">
<p>МДФ пластик</p>
</div>

<div class="card" onclick="selectMaterial(this,'МДФ эмаль',50000)">
<div class="check">✓</div>
<img src="emal.png">
<p>МДФ эмаль</p>
</div>

<div class="card center" onclick="selectMaterial(this,'Шпон',60000)">
<div class="check">✓</div>
<img src="shpon.png">
<p>Шпон</p>
</div>

</div>

</div>

<div id="screen4" style="display:none">

<h2>Столешница</h2>

<div class="cards">

<div class="card" onclick="selectCounter(this,'ЛДСП',10000)">
<div class="check">✓</div>
<img src="counter_ldsp.png">
<p>ЛДСП 38мм</p>
</div>

<div class="card" onclick="selectCounter(this,'Компакт',30000)">
<div class="check">✓</div>
<img src="counter_hpl.png">
<p>Компакт плита</p>
</div>

<div class="card center" onclick="selectCounter(this,'Камень',40000)">
<div class="check">✓</div>
<img src="counter_stone.png">
<p>Камень</p>
</div>

</div>

</div>

<div id="screen5" style="display:none">

<h2>Фурнитура</h2>

<div class="cards">

<div class="card" onclick="selectFurn(this,'Boyard',0)">
<div class="check">✓</div>
<img src="boyard.png">
<p>Boyard</p>
</div>

<div class="card" onclick="selectFurn(this,'GTV',20000)">
<div class="check">✓</div>
<img src="gtv.png">
<p>GTV</p>
</div>

<div class="card" onclick="selectFurn(this,'Hettich',30000)">
<div class="check">✓</div>
<img src="hettich.png">
<p>Hettich</p>
</div>

<div class="card" onclick="selectFurn(this,'Blum',40000)">
<div class="check">✓</div>
<img src="blum.png">
<p>Blum</p>
</div>

</div>

</div>

<div id="screen6" style="display:none">

<h2>Стоимость кухни</h2>

<div class="result">

<p id="summary"></p>

<h1 id="price"></h1>

</div>

<br>

<input id="name" placeholder="Ваше имя">
<input id="phone" placeholder="Телефон">

<button onclick="send()">Получить индивидуальный расчет</button>

<br><br>

<button onclick="restart()">Пересчитать кухню</button>

</div>

</div>

<div class="progress" id="progress"></div>

<script>

let data={}

function clearCards(){

document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"))

}

function selectKitchen(el,val){

clearCards()
el.classList.add("selected")

data.kitchen=val

setTimeout(()=>show(2),400)

}

function next2(){

data.length=document.getElementById("length").value

show(3)

}

function selectMaterial(el,val,price){

clearCards()
el.classList.add("selected")

data.material=val
data.materialPrice=price

setTimeout(()=>show(4),400)

}

function selectCounter(el,val,price){

clearCards()
el.classList.add("selected")

data.counter=val
data.counterPrice=price

setTimeout(()=>show(5),400)

}

function selectFurn(el,val,price){

clearCards()
el.classList.add("selected")

data.furn=val
data.furnPrice=price

setTimeout(()=>result(),400)

}

function show(n){

for(let i=1;i<=6;i++){

document.getElementById("screen"+i).style.display="none"

}

document.getElementById("screen"+n).style.display="block"

document.getElementById("progress").style.width=(n*16)+"%"

}

function result(){

let base=35000

let length=parseFloat(data.length)

if(data.kitchen=="Остров"){
length=length+1
}

let total=(base+data.materialPrice+data.counterPrice+data.furnPrice)*length

show(6)

document.getElementById("summary").innerHTML=

`Форма: ${data.kitchen}<br>
Материал: ${data.material}<br>
Столешница: ${data.counter}<br>
Фурнитура: ${data.furn}<br>
Длина: ${data.length} м`

document.getElementById("price").innerText=

total.toLocaleString()+" ₽"

}

function send(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value

let message=

`Заявка с калькулятора

Имя: ${name}
Телефон: ${phone}

Кухня: ${data.kitchen}
Материал: ${data.material}
Столешница: ${data.counter}
Фурнитура: ${data.furn}
Длина: ${data.length} м`

Telegram.WebApp.sendData(message)

alert("Заявка отправлена")

}

function restart(){

location.reload()

}

</script>

</body>
</html>
