<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Калькулятор кухни</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont;
background:#f2f2f5;
margin:0;
overflow-x:hidden;
}

.container{
max-width:520px;
margin:auto;
padding:20px;
position:relative;
}

.screen{
position:absolute;
width:100%;
left:0;
top:0;
transition:transform .35s ease, opacity .35s ease;
}

h2{
text-align:center;
margin-bottom:20px;
}

.cards{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.card{
background:white;
border-radius:22px;
padding:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
text-align:center;
position:relative;
transition:transform .15s ease, border .2s ease;
}

.card:active{
transform:scale(.95);
}

.card.selected{
border:3px solid #007aff;
transform:scale(1.05);
}

.card img{
width:100%;
height:90px;
object-fit:contain;
}

.check{
position:absolute;
top:10px;
right:10px;
background:#007aff;
color:white;
width:26px;
height:26px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
opacity:0;
transform:scale(.5);
transition:.2s;
}

.card.selected .check{
opacity:1;
transform:scale(1);
}

.center{
grid-column:span 2;
width:60%;
margin:auto;
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
margin-bottom:12px;
font-size:16px;
}

button{
background:#007aff;
color:white;
border:none;
padding:16px;
width:100%;
border-radius:16px;
font-size:18px;
}

.result{
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.result img{
width:100%;
border-radius:16px;
margin-bottom:15px;
}

.progress{
position:fixed;
bottom:0;
left:0;
height:6px;
background:#007aff;
width:0%;
transition:.3s;
}

</style>

</head>

<body>

<div class="container">

<div id="screen1" class="screen">

<h2>Форма кухни</h2>

<div class="cards">

<div class="card" onclick="selectKitchen(this,'Прямая')">
<div class="check">✓</div>
<img src="straight.png">
<p>Прямая</p>
</div>

<div class="card" onclick="selectKitchen(this,'Угловая')">
<div class="check">✓</div>
<img src="corner.png">
<p>Угловая</p>
</div>

<div class="card" onclick="selectKitchen(this,'П-образная')">
<div class="check">✓</div>
<img src="u-shape.png">
<p>П-образная</p>
</div>

<div class="card" onclick="selectKitchen(this,'Остров')">
<div class="check">✓</div>
<img src="island.png">
<p>С островом</p>
</div>

</div>
</div>


<div id="screen2" class="screen" style="display:none">

<h2>Длина кухни (м)</h2>

<input id="length" type="number" placeholder="например 3">

<button onclick="next2()">Далее</button>

</div>


<div id="screen3" class="screen" style="display:none">

<h2>Материал фасадов</h2>

<div class="cards">

<div class="card" onclick="selectMaterial(this,'ЛДСП',0)">
<div class="check">✓</div>
<img src="ldsp.png">
<p>ЛДСП</p>
</div>

<div class="card" onclick="selectMaterial(this,'МДФ пленка',20000)">
<div class="check">✓</div>
<img src="plenka.png">
<p>МДФ пленка</p>
</div>

<div class="card" onclick="selectMaterial(this,'МДФ пластик',40000)">
<div class="check">✓</div>
<img src="plastic.png">
<p>МДФ пластик</p>
</div>

<div class="card" onclick="selectMaterial(this,'МДФ эмаль',50000)">
<div class="check">✓</div>
<img src="emal.png">
<p>МДФ эмаль</p>
</div>

<div class="card center" onclick="selectMaterial(this,'Шпон',60000)">
<div class="check">✓</div>
<img src="shpon.png">
<p>Шпон</p>
</div>

</div>
</div>


<div id="screen4" class="screen" style="display:none">

<h2>Столешница</h2>

<div class="cards">

<div class="card" onclick="selectCounter(this,'ЛДСП',10000)">
<div class="check">✓</div>
<img src="counter_ldsp.png">
<p>ЛДСП 38мм</p>
</div>

<div class="card" onclick="selectCounter(this,'Компакт',30000)">
<div class="check">✓</div>
<img src="counter_hpl.png">
<p>Компакт</p>
</div>

<div class="card center" onclick="selectCounter(this,'Камень',40000)">
<div class="check">✓</div>
<img src="counter_stone.png">
<p>Камень</p>
</div>

</div>
</div>


<div id="screen5" class="screen" style="display:none">

<h2>Фурнитура</h2>

<div class="cards">

<div class="card" onclick="selectFurn(this,'Boyard',0)">
<div class="check">✓</div>
<img src="boyard.png">
<p>Boyard</p>
</div>

<div class="card" onclick="selectFurn(this,'GTV',20000)">
<div class="check">✓</div>
<img src="gtv.png">
<p>GTV</p>
</div>

<div class="card" onclick="selectFurn(this,'Hettich',30000)">
<div class="check">✓</div>
<img src="hettich.png">
<p>Hettich</p>
</div>

<div class="card" onclick="selectFurn(this,'Blum',40000)">
<div class="check">✓</div>
<img src="blum.png">
<p>Blum</p>
</div>

</div>
</div>


<div id="screen6" class="screen" style="display:none">

<h2>Стоимость кухни</h2>

<div class="result">

<img id="kitchenImg">

<p id="summary"></p>

<h1 id="price"></h1>

</div>

<br>

<input id="name" placeholder="Ваше имя">
<input id="phone" placeholder="Телефон">

<button onclick="send()">Получить индивидуальный расчет</button>

<br><br>

<button onclick="restart()">Пересчитать кухню</button>

</div>

</div>

<div class="progress" id="progress"></div>

<script>

let data={}
let currentScreen=1

function vibrate(){
if(window.Telegram?.WebApp?.HapticFeedback){
Telegram.WebApp.HapticFeedback.impactOccurred("light")
}
}

function clearCards(){
document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"))
}

function selectKitchen(el,val){
vibrate()
clearCards()
el.classList.add("selected")
data.kitchen=val
setTimeout(()=>show(2),300)
}

function next2(){
let len=document.getElementById("length").value
if(!len){
alert("Введите длину кухни")
return
}
data.length=parseFloat(len)
show(3)
}

function selectMaterial(el,val,price){
vibrate()
clearCards()
el.classList.add("selected")
data.material=val
data.materialPrice=price
setTimeout(()=>show(4),300)
}

function selectCounter(el,val,price){
vibrate()
clearCards()
el.classList.add("selected")
data.counter=val
data.counterPrice=price
setTimeout(()=>show(5),300)
}

function selectFurn(el,val,price){
vibrate()
clearCards()
el.classList.add("selected")
data.furn=val
data.furnPrice=price
setTimeout(()=>result(),300)
}

function show(n){

let old=document.getElementById("screen"+currentScreen)
let next=document.getElementById("screen"+n)

old.style.transform="translateX(-100%)"
old.style.opacity="0"

setTimeout(()=>{
old.style.display="none"

next.style.display="block"
next.style.transform="translateX(100%)"
next.style.opacity="0"

setTimeout(()=>{
next.style.transform="translateX(0)"
next.style.opacity="1"
},20)

},200)

currentScreen=n

document.getElementById("progress").style.width=(n*16)+"%"

}

function result(){

let base=35000
let length=data.length

if(data.kitchen=="Остров"){
length=length+1
}

let total=(base+data.materialPrice+data.counterPrice+data.furnPrice)*length

let img=""

if(data.kitchen=="Прямая"){img="straight.png"}
if(data.kitchen=="Угловая"){img="corner.png"}
if(data.kitchen=="П-образная"){img="u-shape.png"}
if(data.kitchen=="Остров"){img="island.png"}

document.getElementById("kitchenImg").src=img

show(6)

document.getElementById("summary").innerHTML=

`Форма: ${data.kitchen}<br>
Материал: ${data.material}<br>
Столешница: ${data.counter}<br>
Фурнитура: ${data.furn}<br>
Длина: ${data.length} м`

document.getElementById("price").innerText=
total.toLocaleString()+" ₽"

}

function send(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value

let message=
`Заявка с калькулятора

Имя: ${name}
Телефон: ${phone}

Кухня: ${data.kitchen}
Материал: ${data.material}
Столешница: ${data.counter}
Фурнитура: ${data.furn}
Длина: ${data.length} м`

Telegram.WebApp.sendData(message)

alert("Заявка отправлена")

}

function restart(){
location.reload()
}

</script>

</body>
</html>
