<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Калькулятор кухни</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
padding:30px;
}

input,select{
padding:12px;
margin:10px;
width:220px;
border:none;
border-radius:6px;
}

button{
padding:12px 30px;
background:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

h1{
margin-bottom:30px;
}

</style>

</head>

<body>

<h1>Калькулятор кухни</h1>

<input id="size" placeholder="Длина кухни (м)">

<br>

<select id="facade">

<option value="8000">ЛДСП фасады</option>
<option value="15000">МДФ пленка</option>
<option value="25000">Эмаль</option>

</select>

<br>

<select id="furniture">

<option value="3000">Обычная фурнитура</option>
<option value="8000">Blum</option>

</select>

<br><br>

<button onclick="calc()">Рассчитать</button>

<h2 id="result"></h2>

<script>

function calc(){

let size=document.getElementById("size").value

let facade=document.getElementById("facade").value

let furniture=document.getElementById("furniture").value

let price=(size*facade)+Number(furniture)

document.getElementById("result").innerHTML=
"Примерная стоимость: "+price+" ₽"

}

</script>

</body>
</html>
