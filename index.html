<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Kitchen Calculator</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
color:white;
background:url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c") center/cover no-repeat;
}

.container{
background:rgba(0,0,0,0.75);
height:100vh;
padding:30px;
text-align:center;
}

h1{
margin-bottom:5px;
}

.progress{
height:6px;
background:#333;
border-radius:5px;
margin-bottom:30px;
}

.bar{
height:6px;
background:white;
width:20%;
border-radius:5px;
}

.screen{
display:none;
}

.active{
display:block;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
}

.card{
width:160px;
background:#111;
border-radius:16px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:100px;
object-fit:cover;
}

.card p{
padding:10px;
}

input{
padding:14px;
border:none;
border-radius:10px;
margin-top:20px;
width:220px;
}

button{
margin-top:20px;
padding:15px;
border:none;
border-radius:12px;
background:white;
cursor:pointer;
font-size:15px;
}

</style>

</head>

<body>

<div class="container">

<h1>Расчет кухни</h1>

<div class="progress">
<div class="bar" id="bar"></div>
</div>


<!-- экран 1 -->

<div class="screen active" id="s1">

<h2>Тип кухни</h2>

<div class="cards">

<div class="card" onclick="select('type','Прямая',2)">
<img src="https://images.unsplash.com/photo-1600607687644-c94bf1c08b7d">
<p>Прямая</p>
</div>

<div class="card" onclick="select('type','Угловая',2)">
<img src="https://images.unsplash.com/photo-1560185127-6ed189bf02f4">
<p>Угловая</p>
</div>

<div class="card" onclick="select('type','П-образная',2)">
<img src="https://images.unsplash.com/photo-1600566752355-35792bedcfea">
<p>П-образная</p>
</div>

</div>

</div>


<!-- экран 2 -->

<div class="screen" id="s2">

<h2>Материал фасадов</h2>

<div class="cards">

<div class="card" onclick="select('facade','ЛДСП',3)">
<img src="https://images.unsplash.com/photo-1556911220-bff31c812dba">
<p>ЛДСП</p>
</div>

<div class="card" onclick="select('facade','МДФ',3)">
<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
<p>МДФ</p>
</div>

<div class="card" onclick="select('facade','Эмаль',3)">
<img src="https://images.unsplash.com/photo-1588854337118-1c3b1cbeaf77">
<p>Эмаль</p>
</div>

<div class="card" onclick="select('facade','Шпон',3)">
<img src="https://images.unsplash.com/photo-1600607687920-4e2a09cf159d">
<p>Шпон</p>
</div>

</div>

</div>


<!-- экран 3 -->

<div class="screen" id="s3">

<h2>Фурнитура</h2>

<div class="cards">

<div class="card" onclick="select('furniture','Boyard',4)">
<img src="https://cdn-icons-png.flaticon.com/512/3524/3524659.png">
<p>Boyard</p>
</div>

<div class="card" onclick="select('furniture','GTV',4)">
<img src="https://cdn-icons-png.flaticon.com/512/3524/3524659.png">
<p>GTV</p>
</div>

<div class="card" onclick="select('furniture','Blum',4)">
<img src="https://cdn-icons-png.flaticon.com/512/3524/3524659.png">
<p>Blum</p>
</div>

</div>

</div>


<!-- экран 4 -->

<div class="screen" id="s4">

<h2>Размер кухни</h2>

<input id="size" placeholder="например 3 метра">

<br>

<button onclick="next()">Далее</button>

</div>


<!-- экран 5 -->

<div class="screen" id="s5">

<h2>Оставьте заявку</h2>

<input id="name" placeholder="Имя">

<br>

<input id="phone" placeholder="Телефон">

<br>

<button onclick="send()">Отправить заявку</button>

</div>

</div>


<script>

let data={}
let step=1

function updateBar(){

document.getElementById("bar").style.width=(step*20)+"%"

}

function select(key,value,next){

data[key]=value
step=next-1
updateBar()
show(next)

}

function show(id){

document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))

document.getElementById("s"+id).classList.add("active")

}

function next(){

data.size=document.getElementById("size").value

step=4
updateBar()

show(5)

}

function send(){

data.name=document.getElementById("name").value
data.phone=document.getElementById("phone").value

Telegram.WebApp.sendData(JSON.stringify(data))

}

</script>

</body>
</html>
