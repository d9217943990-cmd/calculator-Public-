<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Калькулятор кухни</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f2f2f7;
margin:0;
padding:0;
}

.screen{
display:none;
padding:30px;
}

.active{
display:block;
}

h1{
font-size:26px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.card{
background:white;
border-radius:22px;
padding:20px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.06);
transition:0.2s;
cursor:pointer;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:90px;
margin-bottom:10px;
}

.button{
background:black;
color:white;
padding:16px;
border-radius:16px;
margin-top:25px;
text-align:center;
font-size:18px;
cursor:pointer;
}

input{
width:100%;
padding:16px;
border-radius:14px;
border:1px solid #ddd;
font-size:16px;
margin-top:10px;
}

.slider{
width:100%;
margin-top:30px;
}

.price{
font-size:32px;
font-weight:600;
margin-top:20px;
}

</style>

</head>

<body>

<!-- Форма кухни -->

<div class="screen active" id="step1">

<h1>Форма кухни</h1>

<div class="grid">

<div class="card" onclick="setShape('Прямая')">
<img src="https://img.icons8.com/fluency/96/kitchen-room.png">
<p>Прямая</p>
</div>

<div class="card" onclick="setShape('Угловая')">
<img src="https://img.icons8.com/fluency/96/kitchen.png">
<p>Угловая</p>
</div>

<div class="card" onclick="setShape('П-образная')">
<img src="https://img.icons8.com/fluency/96/kitchen-room.png">
<p>П-образная</p>
</div>

<div class="card" onclick="setShape('С островом')">
<img src="https://img.icons8.com/fluency/96/kitchen.png">
<p>С островом</p>
</div>

</div>

</div>

<!-- Длина кухни -->

<div class="screen" id="step2">

<h1>Длина кухни</h1>

<p id="lengthValue">3 м</p>

<input type="range" min="2" max="8" step="0.1" value="3" class="slider" id="lengthSlider">

<div class="button" onclick="nextStep(3)">Далее</div>

</div>

<!-- Материал -->

<div class="screen" id="step3">

<h1>Материал фасадов</h1>

<div class="grid">

<div class="card" onclick="setMaterial('ЛДСП',0)">
<img src="https://img.icons8.com/fluency/96/wood.png">
<p>ЛДСП</p>
</div>

<div class="card" onclick="setMaterial('МДФ плёнка',20000)">
<img src="https://img.icons8.com/fluency/96/kitchen.png">
<p>МДФ плёнка</p>
</div>

<div class="card" onclick="setMaterial('МДФ пластик',40000)">
<img src="https://img.icons8.com/fluency/96/material.png">
<p>МДФ пластик</p>
</div>

<div class="card" onclick="setMaterial('МДФ эмаль',60000)">
<img src="https://img.icons8.com/fluency/96/paint-palette.png">
<p>МДФ эмаль</p>
</div>

<div class="card" onclick="setMaterial('Шпон',80000)">
<img src="https://img.icons8.com/fluency/96/tree.png">
<p>Шпон</p>
</div>

</div>

</div>

<!-- Столешница -->

<div class="screen" id="step4">

<h1>Столешница</h1>

<div class="grid">

<div class="card" onclick="setCountertop('ЛДСП 38мм',10000)">
<img src="https://img.icons8.com/fluency/96/table.png">
<p>ЛДСП 38мм</p>
</div>

<div class="card" onclick="setCountertop('Компакт HPL',30000)">
<img src="https://img.icons8.com/fluency/96/granite.png">
<p>Компакт HPL</p>
</div>

<div class="card" onclick="setCountertop('Камень',40000)">
<img src="https://img.icons8.com/fluency/96/rock.png">
<p>Камень</p>
</div>

</div>

</div>

<!-- Фурнитура -->

<div class="screen" id="step5">

<h1>Фурнитура</h1>

<div class="grid">

<div class="card" onclick="setHardware('Boyard',0)">
<img src="https://img.icons8.com/fluency/96/settings.png">
<p>Boyard</p>
</div>

<div class="card" onclick="setHardware('GTV',20000)">
<img src="https://img.icons8.com/fluency/96/gear.png">
<p>GTV</p>
</div>

<div class="card" onclick="setHardware('Blum',40000)">
<img src="https://img.icons8.com/fluency/96/premium.png">
<p>Blum</p>
</div>

</div>

</div>

<!-- Результат -->

<div class="screen" id="step6">

<h1>Стоимость кухни</h1>

<div class="price" id="result"></div>

<div class="button" onclick="nextStep(7)">
Оставить контакты
</div>

</div>

<!-- Контакты -->

<div class="screen" id="step7">

<h1>Ваши контакты</h1>

<input id="name" placeholder="Ваше имя">

<input id="phone" placeholder="Телефон">

<div class="button" onclick="sendLead()">
Отправить
</div>

</div>

<script>

let basePrice = 50000

let shape
let length = 3
let material
let countertop
let hardware

let materialPrice = 0
let countertopPrice = 0
let hardwarePrice = 0

const slider = document.getElementById("lengthSlider")

slider.oninput = function(){

length = parseFloat(this.value)

document.getElementById("lengthValue").innerHTML = length + " м"

}

function nextStep(n){

document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))

document.getElementById('step'+n).classList.add('active')

}

function setShape(value){

shape = value

nextStep(2)

}

function setMaterial(name,price){

material = name

materialPrice = price

nextStep(4)

}

function setCountertop(name,price){

countertop = name

countertopPrice = price

nextStep(5)

}

function setHardware(name,price){

hardware = name

hardwarePrice = price

calculate()

}

function calculate(){

let total = (basePrice + materialPrice + countertopPrice + hardwarePrice) * length

document.getElementById("result").innerHTML =
Math.round(total).toLocaleString()+" ₽"

nextStep(6)

}

function sendLead(){

let name = document.getElementById("name").value

let phone = document.getElementById("phone").value

let text = `
Новый расчет кухни

Форма: ${shape}
Длина: ${length} м
Материал: ${material}
Столешница: ${countertop}
Фурнитура: ${hardware}

Клиент:
${name}
${phone}
`

Telegram.WebApp.sendData(text)

}

</script>

</body>
</html>
